- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id sg-07dcbad23f5972a86
    zone_id: "Z01771181AKUPZX8DM2VP"
    domain: "shivv-aws.fun"
    instances:
    - mongodb
    
  tasks:
  - name: create ec2-instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id}}"
      image_id: "{{ ami_id}}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print public_ip
    ansible.builtin.debug:
    